name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build binaries
        run: |
          mkdir -p dist
          VERSION=${{ github.ref_name }}
          COMMIT=$(git rev-parse --short HEAD)
          for target in "linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64"; do
            os="${target%/*}"
            arch="${target#*/}"
            ext=""
            if [ "$os" = "windows" ]; then ext=".exe"; fi
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}" -o dist/snip-${os}-${arch}${ext} ./cmd/server
          done
          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Create Docker image
        run: docker build -t vesper/snip:${{ github.ref_name }} -t vesper/snip:latest .

      - name: Push Docker image
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker push vesper/snip:${{ github.ref_name }}
          docker push vesper/snip:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/snip-*
            dist/SHA256SUMS
