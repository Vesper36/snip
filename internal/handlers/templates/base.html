{{define "base.html"}}<!DOCTYPE html>
<html lang="{{.Lang}}" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snip - {{call .T "hero_title"}}</title>
    <meta name="description" content="{{call .T "hero_subtitle"}}">
    <meta name="theme-color" content="#0a0e14">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9998;</text></svg>">
    <link rel="manifest" href="/static/manifest.json">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Snip - {{call .T "hero_title"}}">
    <meta property="og:description" content="{{call .T "hero_subtitle"}}">
    <meta property="og:site_name" content="Snip">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Snip - {{call .T "hero_title"}}">
    <meta name="twitter:description" content="{{call .T "hero_subtitle"}}">

    <link rel="stylesheet" href="/static/css/style.css" id="theme-css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
        // Theme initialization (runs before paint to avoid flash)
        (function() {
            var t = localStorage.getItem('theme') || 'dark';
            if (t === 'light') {
                document.documentElement.classList.add('light');
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 18l6-6-6-6"/><path d="M8 6l-6 6 6 6"/></svg>
                <span>{{call .T "brand"}}</span>
            </a>
            <button class="nav-toggle" aria-label="Menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <div class="nav-links">
                <a href="/">{{call .T "nav_new"}}</a>
                <a href="/my">{{call .T "nav_browse"}}</a>
                <a href="/settings">{{call .T "nav_settings"}}</a>
                <a href="https://github.com/vesper/snip" target="_blank">{{call .T "nav_github"}}</a>
                <button onclick="toggleTheme()" class="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
                    <svg class="sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
                <select onchange="location.href='/lang?lang='+this.value" class="lang-switch">
                    {{range .SupportedLangs}}<option value="{{.}}" {{if eq $.Lang .}}selected{{end}}>{{index $.LangLabels .}}</option>{{end}}
                </select>
            </div>
        </div>
    </nav>
    <main class="container">
        {{template "content" .}}
    </main>
    <footer class="footer">
        <p>{{call .T "footer"}}</p>
    </footer>
    <script src="/static/js/app.js"></script>
    <script>hljs.highlightAll();</script>
</body>
</html>{{end}}
