{{template "base.html" .}}
{{define "content"}}
<div class="auth-card">
    <div class="auth-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h2>Password Protected</h2>
    <p>This paste requires a password to view.</p>
    {{if .Error}}<div class="alert alert-err">{{.Error}}</div>{{end}}
    <form method="POST" action="/{{.Slug}}" class="auth-form">
        <input type="password" name="password" placeholder="Enter password" class="input-sm" autofocus required>
        <button type="submit" class="btn-primary">Unlock</button>
    </form>
</div>
{{end}}
